<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 명함</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 은은한 움직임이 있는 배경 그라데이션 */
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e1b4b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 배경 장식용 원형 요소 */
        .bg-blur {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.2);
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
        }

        .bg-blur.one { top: 10%; left: 15%; }
        .bg-blur.two { bottom: 10%; right: 15%; }

        /* 글래스모피즘 카드 스타일 */
        .card {
            position: relative;
            z-index: 1;
            width: 380px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* 호버 효과: 부드럽게 커지고 테두리 강조 */
        .card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 프로필 이미지 영역 */
        .profile-img {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            padding: 4px; /* 테두리 효과 */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .profile-img .inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1e293b; /* 이미지가 없을 때 기본 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 텍스트 스타일 */
        .name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .intro {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* 구분선 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            margin-bottom: 25px;
        }

        /* 연락처 정보 */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .contact-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
    </style>
</head>
<body>
    <div class="bg-blur one"></div>
    <div class="bg-blur two"></div>

    <div class="card">
        <!-- 프로필 이미지 -->
        <div class="profile-img">
            <div class="inner">
                <!-- 실제 이미지 경로를 넣으세요. 없으면 아이콘이 표시됩니다. -->
                <img src="./profile.png" alt="내 이미지">
            </div>
        </div>

        <!-- 이름 및 소개 -->
        <h1 class="name">소은경 (so eun kyung)</h1>
        <p class="intro">창의적인 아이디어를 현실로 만드는<br>프론트엔드 개발자 & 디자이너입니다.</p>
        
        <div class="divider"></div>

        <!-- 연락처 -->
        <div class="contact-info">
            <a href="mailto:iamsossem@gmail.com" class="contact-item">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                iamsossem@gmail.com
            </a>
            
            <a href="#" class="contact-item">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                </svg>
                GitHub Profile
            </a>
        </div>
    </div>
</body>
</html>
